<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전국 가맹 도장 - THE STEPPER</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Bebas+Neue&display=swap');
:root{--red:#C8102E;--yellow:#FFE000;--black:#0a0a0a;--dark:#111;--white:#fff}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--black);color:var(--white);font-family:'Noto Sans KR',sans-serif}
nav{position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(10,10,10,0.97);border-bottom:2px solid var(--red);height:70px;display:flex;align-items:center;padding:0 24px;gap:16px}
.nav-back{color:#aaa;text-decoration:none;font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px;transition:color 0.2s}
.nav-back:hover{color:var(--yellow)}
.nav-logo{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;color:var(--yellow)}
.hero{padding:120px 24px 60px;text-align:center;background:radial-gradient(ellipse at 50% 0%,rgba(200,16,46,0.15),transparent 60%)}
.section-tag{font-size:11px;font-weight:700;letter-spacing:4px;color:var(--red);margin-bottom:12px}
.page-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(40px,10vw,80px);letter-spacing:4px;color:var(--white);margin-bottom:16px}
.page-title span{color:var(--yellow)}
.page-desc{font-size:14px;color:#666;line-height:1.8;max-width:500px;margin:0 auto}
.stat-bar{display:flex;justify-content:center;gap:48px;margin-top:40px;flex-wrap:wrap}
.stat-item{text-align:center}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:48px;color:var(--yellow);line-height:1}
.stat-label{font-size:11px;color:#555;letter-spacing:2px;margin-top:4px}
.coming-box{max-width:600px;margin:60px auto;padding:60px 40px;background:var(--dark);border:1px solid #222;border-radius:16px;text-align:center}
.coming-icon{font-size:60px;margin-bottom:24px}
.coming-title{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:3px;color:var(--yellow);margin-bottom:16px}
.coming-desc{font-size:14px;color:#666;line-height:1.8}
.back-btn{display:inline-flex;align-items:center;gap:8px;background:var(--red);color:var(--white);padding:14px 28px;border-radius:8px;font-size:14px;font-weight:700;text-decoration:none;margin-top:32px;transition:all 0.2s}
.back-btn:hover{background:#a50d24;transform:translateY(-2px)}
footer{background:var(--black);border-top:1px solid #1a1a1a;padding:32px 24px;text-align:center;margin-top:80px}
.footer-copy{font-size:11px;color:#2a2a2a}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-back">← 메인으로</a>
  <span class="nav-logo">THE STEPPER</span>
</nav>
<div class="hero">
  <div class="section-tag">LOCATIONS</div>
  <h1 class="page-title">전국 <span>가맹 도장</span></h1>
  <p class="page-desc">더스텝퍼와 함께하는 전국 가맹 도장을 확인하십시오.</p>
  <div class="stat-bar">
    <div class="stat-item"><div class="stat-num">36+</div><div class="stat-label">전국 가맹점</div></div>
    <div class="stat-item"><div class="stat-num">10+</div><div class="stat-label">광역시/도</div></div>
  </div>
</div>
<div style="padding:0 24px 80px">
  <div class="coming-box">
    <div class="coming-icon">📍</div>
    <div class="coming-title">준비 중입니다</div>
    <p class="coming-desc">전국 36개 가맹 도장의 위치 정보와 지도가 곧 공개됩니다.<br>도장명, 주소, 연락처 등 상세 정보를 순차적으로 업데이트할 예정입니다.</p>
    <a href="index.html" class="back-btn">← 메인으로 돌아가기</a>
  </div>
</div>
<footer><div class="footer-copy">© 2026 THE STEPPER. All rights reserved.</div></footer>
</body>
</html>
