<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>일정 관리 - THE STEPPER</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Bebas+Neue&display=swap');
:root{--red:#C8102E;--yellow:#FFE000;--black:#0a0a0a;--gray:#1a1a1a;--white:#fff}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--black);color:var(--white);font-family:'Noto Sans KR',sans-serif;min-height:100vh}

/* 로그인 */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.login-box{background:#111;border:1px solid #222;border-radius:16px;padding:48px 40px;width:100%;max-width:400px;text-align:center}
.login-logo{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:4px;color:var(--yellow);margin-bottom:8px}
.login-sub{font-size:12px;color:#444;letter-spacing:2px;margin-bottom:40px}
.login-input{width:100%;background:#0d0d0d;border:1px solid #2a2a2a;border-radius:8px;padding:14px 16px;color:var(--white);font-size:15px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color 0.2s}
.login-input:focus{border-color:var(--red)}
.login-btn{width:100%;margin-top:16px;background:var(--red);color:#fff;border:none;border-radius:8px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:background 0.2s}
.login-btn:hover{background:#a50d24}
.login-error{color:var(--red);font-size:13px;margin-top:12px;display:none}

/* 관리 패널 */
.admin-wrap{display:none;padding:24px;max-width:900px;margin:0 auto}
.admin-header{display:flex;align-items:center;justify-content:space-between;padding:20px 0;border-bottom:2px solid var(--red);margin-bottom:32px}
.admin-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;color:var(--yellow)}
.logout-btn{background:transparent;border:1px solid #333;color:#666;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px;font-family:'Noto Sans KR',sans-serif;transition:all 0.2s}
.logout-btn:hover{border-color:var(--red);color:var(--red)}

/* 폼 */
.form-section{background:#111;border:1px solid #222;border-radius:12px;padding:28px;margin-bottom:32px}
.form-title{font-size:14px;font-weight:700;color:var(--white);letter-spacing:1px;margin-bottom:20px;display:flex;align-items:center;gap:8px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group.full{grid-column:1/-1}
.form-label{font-size:12px;color:#666;font-weight:600;letter-spacing:0.5px}
.form-control{background:#0d0d0d;border:1px solid #2a2a2a;border-radius:8px;padding:12px 14px;color:var(--white);font-size:14px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color 0.2s;width:100%}
.form-control:focus{border-color:var(--red)}
select.form-control{cursor:pointer}
.form-submit{background:var(--red);color:#fff;border:none;border-radius:8px;padding:13px 28px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:background 0.2s;margin-top:8px}
.form-submit:hover{background:#a50d24}

/* 일정 목록 */
.schedule-list{display:flex;flex-direction:column;gap:12px}
.schedule-card{background:#111;border:1px solid #222;border-radius:10px;padding:18px 20px;display:flex;align-items:center;justify-content:space-between;gap:16px;transition:border-color 0.2s}
.schedule-card:hover{border-color:#333}
.schedule-card.upcoming{border-left:3px solid var(--red)}
.schedule-card.past{border-left:3px solid #333;opacity:0.6}
.card-info{flex:1}
.card-date{font-size:11px;color:var(--red);font-weight:700;letter-spacing:1px;margin-bottom:4px}
.card-title{font-size:15px;font-weight:700;color:var(--white);margin-bottom:4px}
.card-detail{font-size:12px;color:#666}
.card-actions{display:flex;gap:8px;flex-shrink:0}
.btn-delete{background:rgba(200,16,46,0.1);border:1px solid rgba(200,16,46,0.3);color:var(--red);padding:7px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:700;transition:all 0.2s;font-family:'Noto Sans KR',sans-serif}
.btn-delete:hover{background:var(--red);color:#fff}
.empty-msg{text-align:center;padding:40px;color:#333;font-size:14px}

/* 알림 */
.toast{position:fixed;bottom:30px;right:24px;background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:14px 20px;font-size:13px;color:var(--white);z-index:9999;opacity:0;transform:translateY(10px);transition:all 0.3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.toast.success{border-color:var(--yellow);color:var(--yellow)}
.toast.error{border-color:var(--red);color:var(--red)}

@media(max-width:600px){
  .form-grid{grid-template-columns:1fr}
  .schedule-card{flex-direction:column;align-items:flex-start}
}
</style>
</head>
<body>

<!-- 로그인 -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div class="login-logo">THE STEPPER</div>
    <div class="login-sub">ADMIN · 세미나 일정 관리</div>
    <input type="password" class="login-input" id="pwInput" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">로그인</button>
    <div class="login-error" id="loginError">비밀번호가 올바르지 않습니다.</div>
  </div>
</div>

<!-- 관리 패널 -->
<div class="admin-wrap" id="adminWrap">
  <div class="admin-header">
    <div class="admin-title">📋 세미나 일정 관리</div>
    <button class="logout-btn" onclick="doLogout()">로그아웃</button>
  </div>

  <!-- 일정 추가 폼 -->
  <div class="form-section">
    <div class="form-title">➕ 새 일정 추가</div>
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">날짜</label>
        <input type="date" class="form-control" id="fDate">
      </div>
      <div class="form-group">
        <label class="form-label">구분</label>
        <select class="form-control" id="fType">
          <option value="upcoming">예정 일정</option>
          <option value="past">지난 일정</option>
        </select>
      </div>
      <div class="form-group full">
        <label class="form-label">세미나 제목</label>
        <input type="text" class="form-control" id="fTitle" placeholder="예: THE STEPPER 부산·경남 정기 세미나">
      </div>
      <div class="form-group full">
        <label class="form-label">상세 정보 (시간 · 장소)</label>
        <input type="text" class="form-control" id="fDetail" placeholder="예: 오전 10:00~12:00 · 📍 범태권도장 · 대구 북구">
      </div>
    </div>
    <button class="form-submit" onclick="addSchedule()">일정 추가</button>
  </div>

  <!-- 일정 목록 -->
  <div class="form-section">
    <div class="form-title">📅 등록된 일정</div>
    <div class="schedule-list" id="scheduleList">
      <div class="empty-msg">로딩 중...</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, orderBy, query } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBD96_snsYdbET2vzkF7MY8nMJlfHiAxi4",
    authDomain: "thestepper-c9bfb.firebaseapp.com",
    projectId: "thestepper-c9bfb",
    storageBucket: "thestepper-c9bfb.firebasestorage.app",
    messagingSenderId: "787224576231",
    appId: "1:787224576231:web:04d4003f42ecace9016242"
  };
const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
const db = getFirestore(app);

const PASSWORD = "kms0427***";

// 로그인
window.doLogin = function() {
  var pw = document.getElementById('pwInput').value;
  if(pw === PASSWORD) {
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('adminWrap').style.display = 'block';
    loadSchedules();
  } else {
    document.getElementById('loginError').style.display = 'block';
    document.getElementById('pwInput').value = '';
  }
};

window.doLogout = function() {
  document.getElementById('loginWrap').style.display = 'flex';
  document.getElementById('adminWrap').style.display = 'none';
  document.getElementById('pwInput').value = '';
};

// 토스트
function showToast(msg, type='success') {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(function(){ t.className = 'toast'; }, 2500);
}

// 일정 불러오기
async function loadSchedules() {
  var list = document.getElementById('scheduleList');
  list.innerHTML = '<div class="empty-msg">로딩 중...</div>';
  try {
    var q = query(collection(db, 'schedules'), orderBy('date', 'desc'));
    var snap = await getDocs(q);
    if(snap.empty) {
      list.innerHTML = '<div class="empty-msg">등록된 일정이 없습니다.</div>';
      return;
    }
    list.innerHTML = '';
    snap.forEach(function(docSnap) {
      var d = docSnap.data();
      var card = document.createElement('div');
      card.className = 'schedule-card ' + (d.type || 'upcoming');
      card.innerHTML = '<div class="card-info">' +
        '<div class="card-date">' + formatDate(d.date) + ' · ' + (d.type === 'past' ? '지난 일정' : '예정 일정') + '</div>' +
        '<div class="card-title">' + d.title + '</div>' +
        '<div class="card-detail">' + (d.detail || '') + '</div>' +
        '</div>' +
        '<div class="card-actions">' +
        '<button class="btn-delete" onclick="deleteSchedule(\'' + docSnap.id + '\')">삭제</button>' +
        '</div>';
      list.appendChild(card);
    });
  } catch(e) {
    list.innerHTML = '<div class="empty-msg">오류가 발생했습니다.</div>';
  }
}

// 날짜 포맷
function formatDate(dateStr) {
  var d = new Date(dateStr);
  return (d.getMonth()+1) + '월 ' + d.getDate() + '일, ' + d.getFullYear();
}

// 일정 추가
window.addSchedule = async function() {
  var date = document.getElementById('fDate').value;
  var title = document.getElementById('fTitle').value.trim();
  var detail = document.getElementById('fDetail').value.trim();
  var type = document.getElementById('fType').value;

  if(!date || !title) {
    showToast('날짜와 제목을 입력해주세요.', 'error');
    return;
  }

  try {
    await addDoc(collection(db, 'schedules'), {
      date: date,
      title: title,
      detail: detail,
      type: type,
      createdAt: new Date().toISOString()
    });
    showToast('일정이 추가되었습니다! ✅');
    document.getElementById('fDate').value = '';
    document.getElementById('fTitle').value = '';
    document.getElementById('fDetail').value = '';
    loadSchedules();
  } catch(e) {
    showToast('추가 실패: ' + e.message, 'error');
  }
};

// 일정 삭제
window.deleteSchedule = async function(id) {
  if(!confirm('이 일정을 삭제하시겠습니까?')) return;
  try {
    await deleteDoc(doc(db, 'schedules', id));
    showToast('삭제되었습니다.');
    loadSchedules();
  } catch(e) {
    showToast('삭제 실패', 'error');
  }
};
</script>
</body>
</html>
