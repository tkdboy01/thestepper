<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>THE STEPPER - 성인부 & 입시센터</title>
  <link rel="icon" href="https://firebasestorage.googleapis.com/v0/b/thestepper-c9bfb.firebasestorage.app/o/assets%2Flogo.png?alt=media" type="image/png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; font-family: 'Pretendard', 'Noto Sans KR', sans-serif; }

    /* 네비게이션 */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      background: rgba(10,10,10,0.95);
      border-bottom: 2px solid #C0392B;
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 24px;
    }
    .nav-logo {
      display: flex; align-items: center; gap: 10px; text-decoration: none;
    }
    .nav-logo img { height: 36px; }
    .nav-logo span { color: #fff; font-weight: 700; font-size: 16px; }
    .nav-back {
      color: #C9A84C; text-decoration: none; font-size: 14px; font-weight: 600;
      border: 1px solid #C9A84C; padding: 6px 14px; border-radius: 4px;
      transition: all 0.3s;
    }
    .nav-back:hover { background: #C9A84C; color: #000; }

    /* 햄버거 메뉴 */
    .hamburger {
      cursor: pointer; display: flex; flex-direction: column;
      gap: 5px; padding: 4px;
    }
    .hamburger span {
      display: block; width: 24px; height: 2px; background: #fff;
      transition: all 0.3s;
    }
    .menu-overlay {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(10,10,10,0.98); z-index: 2000;
      flex-direction: column; align-items: center; justify-content: center; gap: 32px;
    }
    .menu-overlay.active { display: flex; }
    .menu-overlay a {
      color: #fff; text-decoration: none; font-size: 24px; font-weight: 700;
      transition: color 0.3s;
    }
    .menu-overlay a:hover { color: #C9A84C; }
    .menu-overlay a.active-menu { color: #C0392B; }
    .menu-close {
      position: absolute; top: 20px; right: 24px;
      color: #fff; font-size: 32px; cursor: pointer; background: none; border: none;
    }

    /* 메인 컨텐츠 */
    .main-content { padding-top: 65px; }

    /* 포스터 슬라이더 */
    .poster-section {
      max-width: 600px; margin: 0 auto; padding: 20px 16px;
    }
    .poster-title {
      text-align: center; color: #C9A84C; font-size: 13px;
      letter-spacing: 3px; margin-bottom: 16px; text-transform: uppercase;
    }

    /* 슬라이더 */
    .slider-wrap { position: relative; }
    .slider {
      position: relative;
      overflow: hidden; border-radius: 8px;
      border: 1px solid #333;
      width: 100%;
      aspect-ratio: 3/4;
      background: #111;
    }
    .slide {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    .slide.active { opacity: 1; }
    .slide img {
      width: 100%; height: 100%; object-fit: contain; display: block;
    }
    .slider-nav {
      display: flex; justify-content: center; gap: 8px; margin-top: 16px;
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #444; cursor: pointer; transition: background 0.3s;
    }
    .dot.active { background: #C0392B; }
    .prev-btn, .next-btn {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(192,57,43,0.8); color: #fff; border: none;
      width: 36px; height: 36px; border-radius: 50%; cursor: pointer;
      font-size: 16px; display: flex; align-items: center; justify-content: center;
      z-index: 10; transition: background 0.3s;
    }
    .prev-btn { left: 8px; }
    .next-btn { right: 8px; }
    .prev-btn:hover, .next-btn:hover { background: #C0392B; }

    /* 썸네일 */
    .thumbnail-wrap {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 8px; margin-top: 16px;
    }
    .thumb {
      cursor: pointer; border-radius: 6px; overflow: hidden;
      border: 2px solid transparent; transition: border 0.3s;
    }
    .thumb.active { border-color: #C0392B; }
    .thumb img { width: 100%; display: block; }

    /* 문의 버튼 */
    .contact-section {
      text-align: center; padding: 32px 16px;
      background: #111; margin-top: 8px;
    }
    .contact-section p {
      color: #888; font-size: 14px; margin-bottom: 16px;
    }
    .contact-btns {
      display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
    }
    .btn-call {
      background: #C0392B; color: #fff; text-decoration: none;
      padding: 12px 28px; border-radius: 6px; font-weight: 700; font-size: 15px;
    }
    .btn-kakao {
      background: #FEE500; color: #000; text-decoration: none;
      padding: 12px 28px; border-radius: 6px; font-weight: 700; font-size: 15px;
    }
    .btn-home {
      background: #1a1a1a; color: #C9A84C; text-decoration: none;
      padding: 12px 28px; border-radius: 6px; font-weight: 700; font-size: 15px;
      border: 1px solid #C9A84C;
    }

    /* 푸터 */
    footer {
      background: #000; border-top: 1px solid #222;
      text-align: center; padding: 20px; color: #555; font-size: 12px;
    }
    footer a { color: #C9A84C; text-decoration: none; }
  </style>
</head>
<body>

<!-- 네비게이션 -->
<nav>
  <a href="index.html" class="nav-logo">
    <img src="https://firebasestorage.googleapis.com/v0/b/thestepper-c9bfb.firebasestorage.app/o/assets%2Flogo.png?alt=media" alt="THE STEPPER">
    <span>THE STEPPER</span>
  </a>
  <a href="index.html" class="nav-back">← 홈으로</a>
  <div class="hamburger" onclick="toggleMenu()">
    <span></span><span></span><span></span>
  </div>
</nav>

<!-- 햄버거 메뉴 -->
<div class="menu-overlay" id="menuOverlay">
  <button class="menu-close" onclick="toggleMenu()">✕</button>
  <a href="index.html">홈</a>
  <a href="center.html" class="active-menu">성인부 & 입시센터</a>
  <a href="locations.html">가맹 도장</a>
  <a href="schedule.html">세미나 일정</a>
  <a href="staff.html">지도자</a>
  <a href="ai.html">AI 코치</a>
  <a href="contact.html">문의</a>
</div>

<!-- 메인 컨텐츠 -->
<div class="main-content">
  <div class="poster-section">
    <p class="poster-title">THE STEPPER · 성인부 & 입시센터</p>

    <!-- 슬라이더 -->
    <div class="slider-wrap">
      <button class="prev-btn" onclick="changeSlide(-1)">&#8249;</button>
      <div class="slider" id="slider">
        <div class="slide"><img src="https://firebasestorage.googleapis.com/v0/b/thestepper-c9bfb.firebasestorage.app/o/center%2Fposter_page_1.jpg?alt=media" alt="메인 포스터"></div>
        <div class="slide"><img src="https://firebasestorage.googleapis.com/v0/b/thestepper-c9bfb.firebasestorage.app/o/center%2Fposter_page_2.jpg?alt=media" alt="성인반"></div>
        <div class="slide"><img src="https://firebasestorage.googleapis.com/v0/b/thestepper-c9bfb.firebasestorage.app/o/center%2Fposter_page_3.jpg?alt=media" alt="대학 입시반"></div>
        <div class="slide"><img src="https://firebasestorage.googleapis.com/v0/b/thestepper-c9bfb.firebasestorage.app/o/center%2Fposter_page_4.jpg?alt=media" alt="개인레슨"></div>
        <div class="slide"><img src="https://firebasestorage.googleapis.com/v0/b/thestepper-c9bfb.firebasestorage.app/o/center%2Fposter_page_5.jpg?alt=media" alt="지도자"></div>
        <div class="slide"><img src="https://firebasestorage.googleapis.com/v0/b/thestepper-c9bfb.firebasestorage.app/o/center%2Fposter_page_6.jpg?alt=media" alt="문의"></div>
      </div>
      <button class="next-btn" onclick="changeSlide(1)">&#8250;</button>
    </div>

    <!-- 점 네비게이션 -->
    <div class="slider-nav" id="sliderNav">
      <div class="dot active" onclick="goToSlide(0)"></div>
      <div class="dot" onclick="goToSlide(1)"></div>
      <div class="dot" onclick="goToSlide(2)"></div>
      <div class="dot" onclick="goToSlide(3)"></div>
      <div class="dot" onclick="goToSlide(4)"></div>
      <div class="dot" onclick="goToSlide(5)"></div>
    </div>

    <!-- 썸네일 -->
    <div class="thumbnail-wrap">
      <div class="thumb active" onclick="goToSlide(0)"><img src="https://firebasestorage.googleapis.com/v0/b/thestepper-c9bfb.firebasestorage.app/o/center%2Fposter_page_1.jpg?alt=media" alt="1"></div>
      <div class="thumb" onclick="goToSlide(1)"><img src="https://firebasestorage.googleapis.com/v0/b/thestepper-c9bfb.firebasestorage.app/o/center%2Fposter_page_2.jpg?alt=media" alt="2"></div>
      <div class="thumb" onclick="goToSlide(2)"><img src="https://firebasestorage.googleapis.com/v0/b/thestepper-c9bfb.firebasestorage.app/o/center%2Fposter_page_3.jpg?alt=media" alt="3"></div>
      <div class="thumb" onclick="goToSlide(3)"><img src="https://firebasestorage.googleapis.com/v0/b/thestepper-c9bfb.firebasestorage.app/o/center%2Fposter_page_4.jpg?alt=media" alt="4"></div>
      <div class="thumb" onclick="goToSlide(4)"><img src="https://firebasestorage.googleapis.com/v0/b/thestepper-c9bfb.firebasestorage.app/o/center%2Fposter_page_5.jpg?alt=media" alt="5"></div>
      <div class="thumb" onclick="goToSlide(5)"><img src="https://firebasestorage.googleapis.com/v0/b/thestepper-c9bfb.firebasestorage.app/o/center%2Fposter_page_6.jpg?alt=media" alt="6"></div>
    </div>
  </div>

  <!-- 문의 섹션 -->
  <div class="contact-section">
    <p>체험 문의 및 상담은 아래로 연락해주세요.</p>
    <div class="contact-btns">
      <a href="tel:01043047768" class="btn-call">📞 010-4304-7768</a>
      <a href="https://open.kakao.com/o/sMYrP0Ai" target="_blank" class="btn-kakao">💬 카카오톡 문의</a>
      <a href="index.html" class="btn-home">🏠 홈으로</a>
    </div>
  </div>
</div>

<!-- 푸터 -->
<footer>
  <p>© 2021 THE STEPPER · <a href="index.html">www.thestepper.co.kr</a></p>
</footer>

<script>
  let current = 0;
  const total = 6;

  function updateSlider() {
    document.querySelectorAll('.slide').forEach((s, i) => {
      s.classList.toggle('active', i === current);
    });
    document.querySelectorAll('.dot').forEach((d, i) => {
      d.classList.toggle('active', i === current);
    });
    document.querySelectorAll('.thumb').forEach((t, i) => {
      t.classList.toggle('active', i === current);
    });
  }

  function changeSlide(dir) {
    current = (current + dir + total) % total;
    updateSlider();
  }

  function goToSlide(n) {
    current = n;
    updateSlider();
  }

  // 초기화
  updateSlider();

  // 자동 슬라이드 5초
  setInterval(() => changeSlide(1), 5000);

  // 터치 스와이프
  let startX = 0;
  const slider = document.getElementById('slider');
  slider.addEventListener('touchstart', e => startX = e.touches[0].clientX);
  slider.addEventListener('touchend', e => {
    const diff = startX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 50) changeSlide(diff > 0 ? 1 : -1);
  });

  function toggleMenu() {
    document.getElementById('menuOverlay').classList.toggle('active');
  }
</script>
</body>
</html>
