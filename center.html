<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>THE STEPPER - 성인부 & 입시센터</title>
  <link rel="icon" href="https://firebasestorage.googleapis.com/v0/b/thestepper-c9bfb.firebasestorage.app/o/assets%2Flogo.png?alt=media" type="image/png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #ffffff; font-family: 'Noto Sans KR', sans-serif; overflow-x: hidden; }

    /* 네비게이션 */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      background: rgba(255,255,255,0.97);box-shadow:0 2px 8px rgba(0,0,0,0.08);
      border-bottom: 2px solid #C0392B;
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 24px; backdrop-filter: blur(8px);
    }
    .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .nav-logo img { height: 36px; }
    .nav-logo span { color: #1d1d1f; font-weight: 700; font-size: 16px; }
    .nav-back {
      color: #C9A84C; text-decoration: none; font-size: 14px; font-weight: 600;
      border: 1px solid #C9A84C; padding: 6px 14px; border-radius: 4px; transition: all 0.3s;
    }
    .nav-back:hover { background: #C9A84C; color: #000; }
    .hamburger { cursor: pointer; display: flex; flex-direction: column; gap: 5px; padding: 4px; }
    .hamburger span { display: block; width: 24px; height: 2px; background: #1d1d1f; transition: all 0.3s; }

    /* 햄버거 메뉴 */
    .menu-overlay {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(10,10,10,0.97); z-index: 2000;
      flex-direction: column; align-items: center; justify-content: center; gap: 28px;
    }
    .menu-overlay.active { display: flex; }
    .menu-overlay a { color: #ffffff; text-decoration: none; font-size: 22px; font-weight: 700; transition: color 0.3s; }
    .menu-overlay a:hover { color: #C9A84C; }
    .menu-overlay a.active-menu { color: #C0392B; }
    .menu-close { position: absolute; top: 20px; right: 24px; color: #ffffff; font-size: 32px; cursor: pointer; background: none; border: none; }

    /* 풀스크린 슬라이더 */
    .slider-wrap {
      position: relative; width: 100vw;
      height: calc(100vh - 62px); margin-top: 62px;
      background: #000; overflow: hidden;
    }
    .slide {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      opacity: 0; transition: opacity 0.5s ease;
    }
    .slide.active { opacity: 1; }

    /* PC: 가로형 이미지 */
    .slide .img-pc { display: block; width: 100%; height: 100%; object-fit: contain; }
    .slide .img-m  { display: none;  width: 100%; height: 100%; object-fit: contain; }

    /* 모바일: 세로형 이미지 */
    @media (max-width: 768px) {
      .slide .img-pc { display: none; }
      .slide .img-m  { display: block; }
    }

    /* 이전/다음 버튼 */
    .prev-btn, .next-btn {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(0,0,0,0.5); color: #1d1d1f; border: 1px solid rgba(255,255,255,0.2);
      width: 48px; height: 48px; border-radius: 50%; cursor: pointer;
      font-size: 22px; display: flex; align-items: center; justify-content: center;
      z-index: 10; transition: all 0.3s;
    }
    .prev-btn { left: 16px; }
    .next-btn { right: 16px; }
    .prev-btn:hover, .next-btn:hover { background: rgba(192,57,43,0.8); border-color: #C0392B; }

    /* 점 네비게이션 */
    .slider-nav {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 10px; z-index: 10;
    }
    .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: rgba(255,255,255,0.3); cursor: pointer;
      transition: all 0.3s; border: 1px solid rgba(255,255,255,0.4);
    }
    .dot.active { background: #C0392B; border-color: #C0392B; transform: scale(1.2); }

    /* 썸네일 (PC만) */
    .thumbnail-wrap {
      position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 8px; z-index: 10;
    }
    .thumb {
      width: 80px; height: 45px; cursor: pointer; border-radius: 4px;
      overflow: hidden; border: 2px solid rgba(255,255,255,0.2); transition: border 0.3s;
    }
    .thumb.active { border-color: #C0392B; }
    .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }

    @media (max-width: 768px) {
      .thumbnail-wrap { display: none; }
      .slider-nav { bottom: 16px; }
    }

    /* 플로팅 문의 버튼 */
    .floating-contact { position: fixed; bottom: 24px; right: 24px; display: flex; flex-direction: column; gap: 10px; z-index: 900; }
    .float-btn {
      display: flex; align-items: center; justify-content: center;
      width: 52px; height: 52px; border-radius: 50%; text-decoration: none; font-size: 22px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5); transition: transform 0.2s;
    }
    .float-btn:hover { transform: translateY(-3px) scale(1.08); }
    .float-call { background: #C0392B; }
    .float-kakao { background: #FEE500; }
  </style>
</head>

<script>
  let current = 0;
  const total = 6;

  function updateSlider() {
    document.querySelectorAll('.slide').forEach((s, i) => s.classList.toggle('active', i === current));
    document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === current));
    document.querySelectorAll('.thumb').forEach((t, i) => t.classList.toggle('active', i === current));
  }

  function changeSlide(dir) { current = (current + dir + total) % total; updateSlider(); }
  function goToSlide(n) { current = n; updateSlider(); }

  setInterval(() => changeSlide(1), 5000);

  let startX = 0;
  const wrap = document.querySelector('.slider-wrap');
  wrap.addEventListener('touchstart', e => startX = e.touches[0].clientX);
  wrap.addEventListener('touchend', e => {
    const diff = startX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 50) changeSlide(diff > 0 ? 1 : -1);
  });

  function toggleMenu() { document.getElementById('menuOverlay').classList.toggle('active'); }
</script>
